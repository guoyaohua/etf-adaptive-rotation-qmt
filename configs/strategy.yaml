project:
  name: "ETF Adaptive Rotation for QMT"
  strategy_version: "0.4.0"
  timezone: "Asia/Shanghai"

universe:
  # 仅配置在沪深市场具有日内回转交易资格的品种。实盘前仍须向券商确认。
  - {symbol: "513100.SH", name: "纳指ETF", role: "growth", group: "us_equity", t0: true}
  - {symbol: "513500.SH", name: "标普500ETF", role: "growth", group: "us_equity", t0: true}
  - {symbol: "513050.SH", name: "中概互联网ETF", role: "growth", group: "china_internet", t0: true}
  - {symbol: "510900.SH", name: "H股ETF", role: "growth", group: "hk_equity", t0: true}
  - {symbol: "159920.SZ", name: "恒生ETF", role: "growth", group: "hk_equity", t0: true}
  - {symbol: "513520.SH", name: "日经ETF", role: "growth", group: "jp_equity", t0: true}
  - {symbol: "513030.SH", name: "德国ETF", role: "growth", group: "eu_equity", t0: true}
  - {symbol: "513080.SH", name: "法国ETF", role: "growth", group: "eu_equity", t0: true}
  - {symbol: "518880.SH", name: "黄金ETF", role: "defensive", group: "gold", t0: true}
  - {symbol: "511010.SH", name: "国债ETF", role: "defensive", group: "treasury", t0: true}
  - {symbol: "511260.SH", name: "十年国债ETF", role: "defensive", group: "treasury", t0: true}

strategy:
  allocation_mode: "unified"      # 股票、黄金和国债在同一绝对/相对动量框架竞争
  rebalance_schedule: "staggered_weeks" # 四个错峰四周子组合，每周更新一个子组合
  rebalance_sleeves: 4
  rebalance_weekday: 4              # 每周最后交易日收盘生成信号，常规周为周五
  rebalance_calendar: "XSHG"      # 交易所日历决定节假日周的最后交易日，行情缺失不得冒充休市
  rebalance_interval_weeks: 4       # fixed_weeks 模式使用；月末模式忽略
  rebalance_phase_weeks: 0          # fixed_weeks 模式的稳定纪元相位
  momentum_lookbacks: [20, 60, 120]
  momentum_weights: [0.20, 0.30, 0.50]
  momentum_skip_days: 5             # 避免追逐最近一周的短期脉冲
  growth_trend_sma: 180
  defensive_trend_sma: 100
  fast_ema: 50
  fast_slope_days: 20
  volatility_lookback: 40
  atr_lookback: 20
  correlation_lookback: 60
  max_pairwise_correlation: 0.85
  min_average_amount: 20000000      # 20日平均成交额下限（元）
  liquidity_lookback: 20
  min_price: 0.50
  risk_on_breadth: 0.40
  risk_on_median_momentum: 0.00
  min_weighted_momentum: 0.00
  score_volatility_floor: 0.10
  score_volatility_exponent: 0.75 # 排名保留波动惩罚，但避免与逆波动率仓位重复全额惩罚
  selection_count: 3
  defensive_selection_count: 2
  target_annual_volatility: 0.10
  max_asset_weight: 0.40
  max_defensive_weight: 0.40
  max_gross_exposure: 0.90
  idle_cash_proxy_group: "treasury" # 仅在国债长期趋势与动量为正时承接部分闲置风险预算
  idle_cash_proxy_max_weight: 0.30
  min_weight_change: 0.01

risk:
  soft_drawdown: 0.08
  soft_drawdown_scale: 0.50
  hard_drawdown: 0.12
  hard_cooldown_days: 10
  daily_loss_limit: 0.02
  daily_loss_cooldown_days: 5
  initial_stop_atr: 2.50
  trailing_activation_atr: 1.50
  trailing_stop_atr: 3.00
  minimum_stop_distance: 0.015    # ATR 过小时至少保留 1.5% 距离，减少低波资产噪声止损

execution:
  initial_capital: 1000000
  lot_size: 100
  commission_rate: 0.00010
  minimum_commission: 5.0
  slippage_rate: 0.00050
  stress_cost_multiplier: 2.0
  max_quote_age_seconds: 5
  strategy_tag: "ETF_RR_V1"

qmt:
  client_path_env: "QMT_CLIENT_PATH"
  account_id_env: "QMT_ACCOUNT_ID"
  allow_live_orders: false
  data_directory: "data/qmt"
  runtime_directory: "runtime"
  history_start: "20150101"
  live_plan_max_age_minutes: 20

llm:
  enabled: false                    # 本地显式开启；默认纯量化，保证历史回测可复现
  provider: "litellm"
  mode: "single"                 # single 或 vote
  models: ["github_copilot/gemini-3-pro-preview"]
  api_key_env: "GITHUB_TOKEN"    # 只读取环境变量，禁止把 Token 写入 YAML
  temperature: 0.0
  seed: 42
  timeout_seconds: 120
  max_tokens: 1200
  max_retries: 2
  min_confidence: 0.70
  min_valid_votes: 1
  consensus_ratio: 0.50             # 胜出动作必须严格超过该比例
  failure_policy: "quant_only"   # quant_only / all_cash / error
  allow_exits: true
  max_scale_down: 1.0               # LLM 最多可缩至现金；永远不能放大量化权重
  cache_directory: "runtime/llm"

validation:
  minimum_years: 3.0
  maximum_drawdown: 0.15
  minimum_calmar: 0.70
  minimum_sharpe: 0.60
  minimum_positive_year_ratio: 0.60
  require_positive_stress_cagr: true
