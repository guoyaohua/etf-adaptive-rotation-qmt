<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">ETF 自适应轮动策略流程</title>
  <desc id="desc">已完成的 QMT 日线与上交所交易日历经过数据边界检查、趋势动量筛选、风险预算和四子组合聚合，最终形成下一交易日的受保护订单计划。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#2563EB"/>
    </marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;Microsoft YaHei&quot;,&quot;Noto Sans CJK SC&quot;,sans-serif}
      .title{font-size:28px;font-weight:700;fill:#0F172A}.subtitle{font-size:15px;fill:#475569}
      .stage{fill:#FFFFFF;stroke:#CBD5E1;stroke-width:1.5}.stage-title{font-size:21px;font-weight:700;fill:#0F172A}.stage-copy{font-size:15px;fill:#475569}
      .step{font-size:14px;font-weight:700;fill:#FFFFFF}.chip{fill:#EFF6FF}.chip-text{font-size:14px;font-weight:600;fill:#1E3A8A}
      .arrow{fill:none;stroke:#2563EB;stroke-width:2;marker-end:url(#arrow)}.guard{fill:#ECFDF5;stroke:#A7F3D0}.guard-title{font-size:15px;font-weight:700;fill:#065F46}.guard-copy{font-size:14px;fill:#047857}
      .timeline{font-size:14px;font-weight:600;fill:#334155}.timeline-note{font-size:13px;fill:#64748B}
    </style>
  </defs>

  <rect width="1200" height="600" rx="24" fill="#F8FAFC"/>
  <text x="54" y="58" class="title">一份周度信号，如何变成下一交易日订单？</text>
  <text x="54" y="88" class="subtitle">研究、回测、离线信号与 QMT 实盘计划共用同一条决策链</text>

  <g transform="translate(54 126)">
    <rect class="stage" width="246" height="326" rx="18"/>
    <circle cx="30" cy="32" r="17" fill="#2563EB"/><text x="30" y="37" text-anchor="middle" class="step">1</text>
    <text x="58" y="40" class="stage-title">守住数据边界</text>
    <rect x="22" y="67" width="202" height="48" rx="10" class="chip"/><text x="123" y="96" text-anchor="middle" class="chip-text">QMT 已完成日线</text>
    <rect x="22" y="126" width="202" height="48" rx="10" class="chip"/><text x="123" y="155" text-anchor="middle" class="chip-text">XSHG 交易日历</text>
    <text x="22" y="211" class="stage-copy">• 只看决策时已知数据</text>
    <text x="22" y="241" class="stage-copy">• 行情与会话逐日对齐</text>
    <text x="22" y="271" class="stage-copy">• 缺失、陈旧、异常即停止</text>
    <rect x="22" y="290" width="202" height="20" rx="10" fill="#DBEAFE"/>
    <text x="123" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">不把数据缺口当作休市</text>
  </g>

  <path class="arrow" d="M311 289H337"/>

  <g transform="translate(348 126)">
    <rect class="stage" width="246" height="326" rx="18"/>
    <circle cx="30" cy="32" r="17" fill="#2563EB"/><text x="30" y="37" text-anchor="middle" class="step">2</text>
    <text x="58" y="40" class="stage-title">选出更强资产</text>
    <rect x="22" y="67" width="202" height="48" rx="10" class="chip"/><text x="123" y="88" text-anchor="middle" class="chip-text">趋势 + EMA 斜率</text><text x="123" y="106" text-anchor="middle" font-size="12" fill="#475569">先判断是否值得参与</text>
    <rect x="22" y="126" width="202" height="48" rx="10" class="chip"/><text x="123" y="147" text-anchor="middle" class="chip-text">20 / 60 / 120 日动量</text><text x="123" y="165" text-anchor="middle" font-size="12" fill="#475569">跳过最近 5 个交易日</text>
    <rect x="22" y="185" width="202" height="48" rx="10" class="chip"/><text x="123" y="206" text-anchor="middle" class="chip-text">动量 ÷ 波动率⁰·⁷⁵</text><text x="123" y="224" text-anchor="middle" font-size="12" fill="#475569">强度与风险一起排名</text>
    <text x="22" y="268" class="stage-copy">相关性与风险组去重</text>
    <text x="22" y="296" class="stage-copy">每份信号最多 3 只 ETF</text>
  </g>

  <path class="arrow" d="M605 289H631"/>

  <g transform="translate(642 126)">
    <rect class="stage" width="246" height="326" rx="18"/>
    <circle cx="30" cy="32" r="17" fill="#2563EB"/><text x="30" y="37" text-anchor="middle" class="step">3</text>
    <text x="58" y="40" class="stage-title">决定买多少</text>
    <text x="22" y="88" class="stage-copy">① 逆波动率初始分配</text>
    <line x1="31" y1="104" x2="31" y2="128" stroke="#93C5FD" stroke-width="2"/>
    <text x="22" y="151" class="stage-copy">② 缩放至 10% 目标波动</text>
    <line x1="31" y1="167" x2="31" y2="191" stroke="#93C5FD" stroke-width="2"/>
    <text x="22" y="214" class="stage-copy">③ 应用资产与总仓位上限</text>
    <line x1="31" y1="230" x2="31" y2="254" stroke="#93C5FD" stroke-width="2"/>
    <text x="22" y="277" class="stage-copy">④ 最多 30% 闲置预算</text>
    <text x="42" y="300" font-size="13" fill="#64748B">由货币 ETF 有条件承接</text>
  </g>

  <path class="arrow" d="M899 289H925"/>

  <g transform="translate(936 126)">
    <rect class="stage" width="210" height="326" rx="18"/>
    <circle cx="30" cy="32" r="17" fill="#2563EB"/><text x="30" y="37" text-anchor="middle" class="step">4</text>
    <text x="58" y="40" class="stage-title">安全落地</text>
    <rect x="20" y="67" width="170" height="48" rx="10" class="chip"/><text x="105" y="88" text-anchor="middle" class="chip-text">四份信号取平均</text><text x="105" y="106" text-anchor="middle" font-size="12" fill="#475569">每周只更新一份</text>
    <rect x="20" y="126" width="170" height="48" rx="10" class="chip"/><text x="105" y="155" text-anchor="middle" class="chip-text">ATR + 组合风控</text>
    <rect x="20" y="185" width="170" height="48" rx="10" class="chip"/><text x="105" y="206" text-anchor="middle" class="chip-text">先卖后买 · 整手</text><text x="105" y="224" text-anchor="middle" font-size="12" fill="#475569">1% 免交易带</text>
    <rect x="20" y="258" width="170" height="44" rx="12" fill="#0F766E"/>
    <text x="105" y="285" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">默认仅生成计划</text>
  </g>

  <g transform="translate(54 482)">
    <rect class="guard" width="1092" height="76" rx="16"/>
    <circle cx="38" cy="38" r="20" fill="#059669"/>
    <path d="M29 38l6 6 12-14" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="31" class="guard-title">因果时序</text>
    <text x="72" y="54" class="guard-copy">本周最后交易日收盘后决策</text>
    <path d="M334 38H431" class="arrow"/>
    <text x="457" y="31" class="timeline">冻结目标与风险状态</text>
    <text x="457" y="54" class="timeline-note">当天收盘价不会被用于当天成交</text>
    <path d="M720 38H817" class="arrow"/>
    <text x="844" y="31" class="timeline">下一交易日执行</text>
    <text x="844" y="54" class="timeline-note">实盘下单仍需配置、命令和人工确认</text>
  </g>
</svg>
