<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">货币 ETF 年度持有与强制空仓窗口</title>
  <desc id="desc">银华日利 ETF 在每年一月十六日至十二月十四日可有条件承接最多百分之三十闲置资金；十二月十五日至次年一月十五日强制空仓，十二月二十七日至三十一日只允许识别价格复位信号。</desc>
  <defs><style>text{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;Microsoft YaHei&quot;,&quot;Noto Sans CJK SC&quot;,sans-serif}.title{font-size:28px;font-weight:700;fill:#0f172a}.sub{font-size:15px;fill:#475569}.month{font-size:13px;font-weight:700;fill:#475569}.open{fill:#dbeafe;stroke:#93c5fd}.blocked{fill:#ffedd5;stroke:#fdba74}.reset{fill:#fee2e2;stroke:#fca5a5}.label{font-size:16px;font-weight:700;fill:#0f172a}.copy{font-size:14px;fill:#475569}.rule{fill:#fff;stroke:#cbd5e1}.rule-title{font-size:16px;font-weight:700;fill:#0f172a}.rule-copy{font-size:14px;fill:#475569}</style></defs>
  <rect width="1200" height="430" rx="24" fill="#f8fafc"/><text x="54" y="58" class="title">货币 ETF 只在分红黑窗外承接闲置预算</text><text x="54" y="88" class="sub">511880.SH 不参加主资产排名；缺少可靠分红流水时，宁可提前空仓也不虚构收益</text>
  <g transform="translate(54 130)">
    <text x="0" y="-12" class="month">1 月</text><text x="91" y="-12" class="month">2 月</text><text x="182" y="-12" class="month">3 月</text><text x="273" y="-12" class="month">4 月</text><text x="364" y="-12" class="month">5 月</text><text x="455" y="-12" class="month">6 月</text><text x="546" y="-12" class="month">7 月</text><text x="637" y="-12" class="month">8 月</text><text x="728" y="-12" class="month">9 月</text><text x="819" y="-12" class="month">10 月</text><text x="910" y="-12" class="month">11 月</text><text x="1001" y="-12" class="month">12 月</text>
    <rect width="1092" height="70" rx="14" class="open"/><rect width="45" height="70" rx="14" class="blocked"/><rect x="1047" width="45" height="70" rx="14" class="blocked"/><rect x="1082" width="10" height="70" class="reset"/>
    <text x="546" y="31" text-anchor="middle" class="label">01-16 至 12-14：可有条件持有</text><text x="546" y="54" text-anchor="middle" class="copy">长期趋势与动量为正，最多占组合 30%</text>
    <text x="0" y="100" class="copy">← 01-01 至 01-15 空仓</text><text x="1092" y="100" text-anchor="end" class="copy">12-15 起空仓 →</text>
  </g>
  <g transform="translate(54 272)"><rect width="336" height="104" rx="15" class="rule"/><text x="20" y="34" class="rule-title">成交与估值</text><text x="20" y="62" class="rule-copy">始终使用原始 OHLC</text><text x="20" y="85" class="rule-copy">回测不记任何估算分红</text><rect x="378" width="336" height="104" rx="15" class="rule"/><text x="398" y="34" class="rule-title">连续信号</text><text x="398" y="62" class="rule-copy">只用于趋势、动量和波动率</text><text x="398" y="85" class="rule-copy">只使用当日及以前信息</text><rect x="756" width="336" height="104" rx="15" class="rule"/><text x="776" y="34" class="rule-title">失败关闭</text><text x="776" y="62" class="rule-copy">黑窗外异常复位即停止</text><text x="776" y="85" class="rule-copy">实盘退出锁存至成交对账</text></g>
</svg>
