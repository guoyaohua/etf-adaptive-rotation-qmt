<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">ETF Adaptive Rotation strategy flow</title>
  <desc id="desc">Daily QMT market data passes through liquidity, trend and momentum filters, then correlation constrained selection, staggered sleeves, volatility sizing and risk controls to produce a next-session order plan.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1220"/><stop offset="1" stop-color="#17233b"/></linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1e3a5f"/><stop offset="1" stop-color="#235b72"/></linearGradient>
    <linearGradient id="risk" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#4a2b4e"/><stop offset="1" stop-color="#71394f"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#7dd3fc"/></marker>
    <style>
      .h{font:700 24px system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc}.t{font:600 17px system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc}.s{font:400 13px system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}.n{fill:url(#node);stroke:#38bdf8;stroke-width:1.5;rx:16;filter:url(#shadow)}.r{fill:url(#risk);stroke:#fb7185;stroke-width:1.5;rx:16;filter:url(#shadow)}.a{fill:none;stroke:#7dd3fc;stroke-width:2.2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="430" rx="24" fill="url(#bg)"/>
  <text x="54" y="54" class="h">From completed bars to a controlled portfolio</text>
  <g transform="translate(45 100)"><rect class="n" width="170" height="105"/><text x="85" y="38" text-anchor="middle" class="t">QMT daily bars</text><text x="85" y="65" text-anchor="middle" class="s">OHLCV · amount</text><text x="85" y="85" text-anchor="middle" class="s">completed sessions only</text></g>
  <path class="a" d="M215 152h48"/>
  <g transform="translate(265 100)"><rect class="n" width="190" height="105"/><text x="95" y="33" text-anchor="middle" class="t">Eligibility</text><text x="95" y="60" text-anchor="middle" class="s">price · history · liquidity</text><text x="95" y="82" text-anchor="middle" class="s">T+0 allow-list</text></g>
  <path class="a" d="M455 152h48"/>
  <g transform="translate(505 100)"><rect class="n" width="205" height="105"/><text x="102" y="31" text-anchor="middle" class="t">Signal engine</text><text x="102" y="57" text-anchor="middle" class="s">20 / 60 / 120-day momentum</text><text x="102" y="79" text-anchor="middle" class="s">trend + EMA slope</text></g>
  <path class="a" d="M710 152h48"/>
  <g transform="translate(760 100)"><rect class="n" width="190" height="105"/><text x="95" y="32" text-anchor="middle" class="t">Selection</text><text x="95" y="59" text-anchor="middle" class="s">risk-adjusted ranking</text><text x="95" y="81" text-anchor="middle" class="s">group + correlation caps</text></g>
  <path class="a" d="M950 152h48"/>
  <g transform="translate(1000 100)"><rect class="n" width="155" height="105"/><text x="77" y="32" text-anchor="middle" class="t">4 sleeves</text><text x="77" y="59" text-anchor="middle" class="s">one refreshed</text><text x="77" y="81" text-anchor="middle" class="s">each Friday</text></g>
  <path class="a" d="M1078 205v46H842v36"/>
  <g transform="translate(735 287)"><rect class="r" width="215" height="105"/><text x="107" y="30" text-anchor="middle" class="t">Risk controls</text><text x="107" y="56" text-anchor="middle" class="s">ATR stops · drawdown gates</text><text x="107" y="79" text-anchor="middle" class="s">daily loss cooldown</text></g>
  <path class="a" d="M735 340h-57"/>
  <g transform="translate(470 287)"><rect class="n" width="205" height="105"/><text x="102" y="30" text-anchor="middle" class="t">Position sizing</text><text x="102" y="56" text-anchor="middle" class="s">inverse volatility</text><text x="102" y="79" text-anchor="middle" class="s">10% vol target · cash reserve</text></g>
  <path class="a" d="M470 340h-57"/>
  <g transform="translate(205 287)"><rect class="n" width="205" height="105"/><text x="102" y="30" text-anchor="middle" class="t">Next-session plan</text><text x="102" y="56" text-anchor="middle" class="s">sells before buys</text><text x="102" y="79" text-anchor="middle" class="s">1% no-trade band</text></g>
  <path class="a" d="M205 340h-52"/>
  <g transform="translate(45 287)"><rect class="r" width="105" height="105"/><text x="52" y="34" text-anchor="middle" class="t">QMT</text><text x="52" y="61" text-anchor="middle" class="s">dry-run</text><text x="52" y="81" text-anchor="middle" class="s">by default</text></g>
</svg>
